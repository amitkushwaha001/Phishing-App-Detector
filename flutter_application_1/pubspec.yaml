name: flutter_application_1
description: "A professional phishing detection app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Existing packages
  http: ^1.2.0
  intl: ^0.19.0
  url_launcher: ^6.2.5
  cupertino_icons: ^1.0.6

  # --- NEW PACKAGES FOR SHARING ---
  screenshot: ^3.0.0      # To capture the screen image
  share_plus: ^9.0.0      # To share the image file
  path_provider: ^2.1.3   # To save the image temporarily

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true